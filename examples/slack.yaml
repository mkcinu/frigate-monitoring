# Send Slack notifications for alert reviews.
#
# Usage: frigate-monitor --config examples/slack.yaml
#
# Required environment variables:
#   SLACK_BOT_TOKEN  — Slack bot token (xoxb-...)
#                      Required OAuth scopes: chat:write, files:write
#   SLACK_CHANNEL    — channel ID (e.g. C0123456789, NOT "#channel-name")
#                      Find it: click channel → View channel details → About tab

actions:
  # On start: immediate alert with early GIF.
  - type: slack
    bot_token: ${SLACK_BOT_TOKEN}
    channel: ${SLACK_CHANNEL}  # must be a channel ID, e.g. C0123456789
    title: ":rotating_light: {label} on {camera}"
    message: |
      :eye: *{label}* ({score_pct}) on *{camera}* at {start_time}  |  :round_pushpin: {zones}
      :frame_with_picture: <{external_snapshot_url}|Snapshot>  ·  :film_frames: <{external_gif_url}|GIF>
    attach_gif: true
    attach_snapshot: false
    filter:
      alerts_only: true
      triggers: [start]

  # On best: full summary with final GIF attached.
  - type: slack
    bot_token: ${SLACK_BOT_TOKEN}
    channel: ${SLACK_CHANNEL}
    title: ":checkered_flag: {label} on {camera} — {duration:.0f}s"
    message: |
      :bust_in_silhouette: *{label}* ({sub_label})  |  :dart: {score_pct} (top {top_score_pct})  |  :timer_clock: {duration:.0f}s  |  :round_pushpin: {zones}
      :frame_with_picture: <{external_snapshot_url}|Snapshot>  ·  :clapper: <{external_clip_url}|Clip>  ·  :film_frames: <{external_gif_url}|GIF>
    attach_gif: true
    attach_snapshot: false
    filter:
      alerts_only: true
      triggers: [best]
