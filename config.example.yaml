mqtt:
  host: 192.168.1.100
  port: 1883
  # user: mqtt_user
  # password: mqtt_pass
  # topic: frigate/reviews  # default

frigate:
  host: 192.168.1.100
  port: 5000
  # external_url: https://frigate.example.com

actions:
  # Immediate notification when a review first becomes an alert
  - type: print
    template: "[{camera}] START: {label} ({score_pct})"
    filter:
      triggers: [start]
      alerts_only: true

  # Best-quality notification when the review ends
  - type: print
    template: "[{camera}] BEST: {label} ({top_score_pct}) — {objects}"
    filter:
      triggers: [best]
      alerts_only: true

  # Log all reviews (no triggers = fires on every MQTT message)
  - type: log
    level: INFO

  # Webhook with best event at review end
  - type: webhook
    url: https://hooks.example.com/frigate
    method: POST
    body:
      text: "{label} detected on {camera} ({top_score_pct})"
      camera: "{camera}"
      snapshot: "{snapshot_url}"
      gif: "{gif_url}"
    headers:
      Authorization: "Bearer ${WEBHOOK_TOKEN}"
    filter:
      triggers: [best]
      alerts_only: true

  # Pushover: immediate alert + best-quality follow-up
  # - type: pushover
  #   token: ${PUSHOVER_TOKEN}
  #   user_key: ${PUSHOVER_USER}
  #   title: "Frigate: {label} on {camera}"
  #   message: "{label} detected ({score_pct})"
  #   attach_snapshot: true
  #   options:
  #     sound: siren
  #     priority: 1
  #   filter:
  #     triggers: [start]
  #     alerts_only: true

  # - type: pushover
  #   token: ${PUSHOVER_TOKEN}
  #   user_key: ${PUSHOVER_USER}
  #   title: "Frigate: {label} ended ({duration:.0f}s)"
  #   message: "{label} ({top_score_pct})"
  #   url: "{gif_url}"
  #   url_title: "View clip"
  #   attach_snapshot: true
  #   filter:
  #     triggers: [best]
  #     alerts_only: true

